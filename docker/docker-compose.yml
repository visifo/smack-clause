services:
  workspace:
    build:
      context: ./php
      args:
        PHP_VERSION: 8.5
        UID: ${UID}
        GID: ${GID}
    user: "${UID}:${GID}"
    environment:
      # - XDEBUG_MODE=coverage,debug,develop
      - XDEBUG_MODE=off
      - XDEBUG_CONFIG=client_host=host.docker.internal
    volumes:
      - ../:/app
    tty: true
    stdin_open: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
